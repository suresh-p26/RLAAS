<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f0c29"/>
      <stop offset="50%"  stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
  </defs>

  <!-- rounded-square background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>

  <!-- gauge track arc (muted white) -->
  <path d="M7 21 A10.5 10.5 0 0 1 25 21"
        fill="none" stroke="rgba(255,255,255,0.2)"
        stroke-width="2.5" stroke-linecap="round"/>

  <!-- gauge fill arc (accent blue – ~60 % of the way) -->
  <path d="M7 21 A10.5 10.5 0 0 1 21.3 12.5"
        fill="none" stroke="#4361ee"
        stroke-width="2.5" stroke-linecap="round"/>

  <!-- needle -->
  <line x1="16" y1="21" x2="21" y2="12.8"
        stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- pivot dot -->
  <circle cx="16" cy="21" r="2.2" fill="white"/>
</svg>
