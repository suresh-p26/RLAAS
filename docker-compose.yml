# RLAAS — Full production stack
# Usage:
#   docker compose up -d          # start everything
#   docker compose up rlaas       # server only (in-memory counters, file policies)
#   docker compose --profile full up -d  # server + redis + postgres
#
# Secrets: Create .env or use Docker secrets for production.
#   RLAAS_REDIS_PASSWORD, RLAAS_POSTGRES_PASSWORD should be set externally.

services:
  # ── RLAAS Server ───────────────────────────────────────────
  rlaas:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"   # HTTP API
      - "9090:9090"   # gRPC API
    environment:
      RLAAS_POLICY_FILE: /etc/rlaas/policies.json
      RLAAS_GRPC_ADDR: ":9090"
      RLAAS_LOG_LEVEL: info
      RLAAS_LOG_FORMAT: json
    volumes:
      - ./examples/policies.json:/etc/rlaas/policies.json:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  # ── Redis (distributed counters) ───────────────────────────
  redis:
    image: redis:7-alpine
    profiles: ["full"]
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${RLAAS_REDIS_PASSWORD:-changeme}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${RLAAS_REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 2s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 384M
        reservations:
          cpus: "0.1"
          memory: 64M
    restart: unless-stopped

  # ── PostgreSQL (policy + counter store) ────────────────────
  postgres:
    image: postgres:16-alpine
    profiles: ["full"]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rlaas
      POSTGRES_USER: rlaas
      POSTGRES_PASSWORD: ${RLAAS_POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rlaas"]
      interval: 5s
      timeout: 2s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    restart: unless-stopped

  # ── RLAAS Server (full stack with Redis + Postgres) ────────
  rlaas-full:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["full"]
    ports:
      - "8081:8080"
      - "9091:9090"
    environment:
      RLAAS_POLICY_FILE: /etc/rlaas/policies.json
      RLAAS_GRPC_ADDR: ":9090"
      RLAAS_COUNTER_BACKEND: redis
      RLAAS_REDIS_ADDR: "redis:6379"
      RLAAS_REDIS_PASSWORD: ${RLAAS_REDIS_PASSWORD:-changeme}
      RLAAS_POLICY_BACKEND: postgres
      RLAAS_POLICY_DSN: "postgres://rlaas:${RLAAS_POSTGRES_PASSWORD:-changeme}@postgres:5432/rlaas?sslmode=disable"
      RLAAS_AUTH_ENABLED: "false"
      RLAAS_LOG_LEVEL: info
      RLAAS_LOG_FORMAT: json
      RLAAS_AUDIT_ENABLED: "true"
      RLAAS_AUDIT_DRIVER: file
      RLAAS_AUDIT_FILE: /var/log/rlaas/audit.jsonl
    volumes:
      - ./examples/policies.json:/etc/rlaas/policies.json:ro
      - audit-data:/var/log/rlaas
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

volumes:
  redis-data:
  pg-data:
  audit-data:
