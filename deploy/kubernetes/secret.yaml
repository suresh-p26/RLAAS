# Secret for sensitive configuration values.
# In production, use an external secret manager (Vault, AWS Secrets Manager,
# GCP Secret Manager, Azure Key Vault) or sealed-secrets / external-secrets.
apiVersion: v1
kind: Secret
metadata:
  name: rlaas-secrets
  namespace: rlaas
  labels:
    app.kubernetes.io/name: rlaas
type: Opaque
stringData:
  # Uncomment and set these values for your auth mode:
  # RLAAS_AUTH_ENABLED: "true"
  # RLAAS_AUTH_MODE: "jwt"
  # RLAAS_AUTH_JWT_SECRET: "CHANGE-ME-IN-PRODUCTION"
  # RLAAS_AUTH_API_KEYS: "key1,key2"
  RLAAS_AUTH_ENABLED: "false"
