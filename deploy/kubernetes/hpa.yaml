apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rlaas-server
  namespace: rlaas
  labels:
    app.kubernetes.io/name: rlaas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rlaas-server
  minReplicas: 3
  maxReplicas: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
