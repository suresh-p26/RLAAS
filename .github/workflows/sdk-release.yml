name: SDK Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.1.1)"
        required: true
        type: string
      publish_python:
        description: Publish Python SDK to PyPI
        required: true
        default: true
        type: boolean
      publish_typescript:
        description: Publish TypeScript SDK to npm
        required: true
        default: true
        type: boolean
      publish_java:
        description: Publish Java SDK to GitHub Packages Maven
        required: true
        default: true
        type: boolean
      publish_dotnet:
        description: Publish .NET SDK to NuGet
        required: true
        default: true
        type: boolean
      dry_run:
        description: Build/pack only, do not publish
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  release:
    if: github.actor == 'suresh-p26'
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ inputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authorize actor (CODEOWNERS only)
        shell: bash
        env:
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          if [[ ! -f .github/CODEOWNERS ]]; then
            echo "Missing .github/CODEOWNERS"
            exit 1
          fi

          owners=$(awk '
            /^[[:space:]]*#/ {next}
            NF >= 2 {
              for (i = 2; i <= NF; i++) {
                gsub(/^@/, "", $i)
                print $i
              }
            }
          ' .github/CODEOWNERS | sort -u)

          echo "CODEOWNERS principals:"
          echo "$owners"

          if echo "$owners" | grep -qx "$ACTOR"; then
            echo "Actor $ACTOR authorized by CODEOWNERS"
            exit 0
          fi

          echo "Actor $ACTOR is not listed in CODEOWNERS and cannot run SDK release workflow"
          exit 1

      - name: Validate tag and derive version
        shell: bash
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][A-Za-z0-9]+)*$ ]]; then
            echo "Invalid tag: ${RELEASE_TAG}. Expected vX.Y.Z or pre-release variants."
            exit 1
          fi
          VERSION="${RELEASE_TAG#v}"
          echo "SDK_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Using SDK version ${VERSION}"

      - name: Setup Python
        if: ${{ inputs.publish_python }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build and publish Python SDK
        if: ${{ inputs.publish_python }}
        shell: bash
        env:
          PYPI_API_TOKEN: ${{ secrets['PYPI_API_TOKEN'] }}
        run: |
          set -euo pipefail
          cd sdk/python

          python -m pip install --upgrade pip build twine

          python - <<'PY'
          from pathlib import Path
          import re
          path = Path("pyproject.toml")
          text = path.read_text(encoding="utf-8")
          text = re.sub(r'(?m)^version\s*=\s*"[^"]+"', f'version = "{__import__("os").environ["SDK_VERSION"]}"', text)
          path.write_text(text, encoding="utf-8")
          PY

          python -m build
          twine check dist/*

          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "dry_run=true, skipping PyPI upload"
            exit 0
          fi

          if [[ -z "${PYPI_API_TOKEN:-}" ]]; then
            echo "Missing secret: PYPI_API_TOKEN"
            exit 1
          fi
          twine upload -u __token__ -p "${PYPI_API_TOKEN}" dist/*

      - name: Setup Node
        if: ${{ inputs.publish_typescript }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Build and publish TypeScript SDK
        if: ${{ inputs.publish_typescript }}
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets['NPM_TOKEN'] }}
        run: |
          set -euo pipefail
          cd sdk/typescript

          npm ci
          npm version "${SDK_VERSION}" --no-git-tag-version
          npm run build

          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            npm pack
            echo "dry_run=true, skipping npm publish"
            exit 0
          fi

          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "Missing secret: NPM_TOKEN"
            exit 1
          fi
          npm publish --access public

      - name: Setup Java
        if: ${{ inputs.publish_java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build and publish Java SDK (GitHub Packages Maven)
        if: ${{ inputs.publish_java }}
        shell: bash
        env:
          MAVEN_USERNAME: ${{ secrets['MAVEN_USERNAME'] }}
          MAVEN_PASSWORD: ${{ secrets['MAVEN_PASSWORD'] }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          cd sdk/java

          mvn -B -q versions:set -DnewVersion="${SDK_VERSION}" -DgenerateBackupPoms=false
          mvn -B -q -DskipTests package

          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "dry_run=true, skipping Maven publish"
            exit 0
          fi

          MAVEN_USERNAME="${MAVEN_USERNAME:-${GITHUB_ACTOR}}"
          MAVEN_PASSWORD="${MAVEN_PASSWORD:-${GITHUB_TOKEN}}"

          if [[ -z "${MAVEN_USERNAME:-}" || -z "${MAVEN_PASSWORD:-}" ]]; then
            echo "Missing credentials for Maven publish (MAVEN_* secrets or default GITHUB_TOKEN unavailable)"
            exit 1
          fi

          cat > /tmp/settings.xml <<'XML'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.MAVEN_USERNAME}</username>
                <password>${env.MAVEN_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          XML

          mvn -B -q -s /tmp/settings.xml -DskipTests deploy \
            -DaltDeploymentRepository=github::default::https://maven.pkg.github.com/rlaas-io/rlaas

      - name: Setup .NET
        if: ${{ inputs.publish_dotnet }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build and publish .NET SDK
        if: ${{ inputs.publish_dotnet }}
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets['NUGET_API_KEY'] }}
        run: |
          set -euo pipefail
          cd sdk/dotnet/Rlaas.Sdk

          dotnet restore
          dotnet pack -c Release -p:PackageVersion="${SDK_VERSION}" -p:Version="${SDK_VERSION}"

          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "dry_run=true, skipping NuGet publish"
            exit 0
          fi

          if [[ -z "${NUGET_API_KEY:-}" ]]; then
            echo "Missing secret: NUGET_API_KEY"
            exit 1
          fi
          dotnet nuget push bin/Release/*.nupkg --source https://api.nuget.org/v3/index.json --api-key "${NUGET_API_KEY}" --skip-duplicate