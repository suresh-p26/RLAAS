name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25"
  MIN_COVERAGE: 90

jobs:
  # ── Lint (golangci-lint) ────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=5m

  # ── Vet & Format ───────────────────────────────────────────
  vet:
    name: Vet & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Files not formatted with gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Check go.mod tidy
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "::error::go.mod or go.sum is not tidy. Run 'go mod tidy' and commit."
            git diff go.mod go.sum
            exit 1
          fi

  # ── Tests + Coverage ───────────────────────────────────────
  test:
    name: Test (coverage ≥ 90%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests with coverage
        run: |
          # Exclude generated protobuf code from coverage
          PKGS=$(go list ./... | grep -v 'api/proto')
          go test -race -coverprofile=coverage.out -covermode=atomic $PKGS

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $NF}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          echo "Minimum required: ${MIN_COVERAGE}%"
          PASS=$(awk "BEGIN {print ($COVERAGE >= $MIN_COVERAGE) ? 1 : 0}")
          if [ "$PASS" -eq 0 ]; then
            echo "::error::Coverage ${COVERAGE}% is below the minimum threshold of ${MIN_COVERAGE}%"
            exit 1
          fi
          echo "Coverage ${COVERAGE}% meets the ${MIN_COVERAGE}% threshold"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 14

  # ── Vulnerability Check ────────────────────────────────────
  vuln:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  # ── Build (amd64 + arm64) ──────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, vet, test, vuln]
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Compute version metadata
        id: meta
        run: |
          echo "version=$(git describe --tags --always --dirty 2>/dev/null || echo dev)" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)"                                    >> "$GITHUB_OUTPUT"
          echo "built=$(date -u +%Y-%m-%dT%H:%M:%SZ)"                                  >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          PKG: github.com/rlaas-io/rlaas/internal/version
        run: |
          LDFLAGS="-s -w \
            -X '${PKG}.Version=${{ steps.meta.outputs.version }}' \
            -X '${PKG}.Commit=${{ steps.meta.outputs.commit }}' \
            -X '${PKG}.BuildTime=${{ steps.meta.outputs.built }}'"
          go build -ldflags="${LDFLAGS}" -o bin/rlaas-server-linux-${{ matrix.goarch }} ./cmd/rlaas-server
          go build -ldflags="${LDFLAGS}" -o bin/rlaas-agent-linux-${{ matrix.goarch }}  ./cmd/rlaas-agent

      - name: Verify binaries
        run: ls -lh bin/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-linux-${{ matrix.goarch }}
          path: bin/
          retention-days: 7

  # ── Docker Build (validate only, no push) ──────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Compute version metadata
        id: meta
        run: |
          echo "version=$(git describe --tags --always --dirty 2>/dev/null || echo dev)" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)"                                    >> "$GITHUB_OUTPUT"
          echo "built=$(date -u +%Y-%m-%dT%H:%M:%SZ)"                                  >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VERSION="${{ steps.meta.outputs.version }}" \
            --build-arg COMMIT="${{ steps.meta.outputs.commit }}" \
            --build-arg BUILT="${{ steps.meta.outputs.built }}" \
            -t rlaas:ci-${{ github.sha }} .
          echo "Docker image built successfully"

      - name: Verify image starts
        run: |
          timeout 5 docker run --rm rlaas:ci-${{ github.sha }} &
          sleep 3
          echo "Docker image starts successfully"
