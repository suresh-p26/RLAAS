version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - misspell
    - unconvert
    - unparam
  settings:
    errcheck:
      check-blank: false
      check-type-assertions: false
    govet:
      enable:
        - shadow
        - printf
        - structtag

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/rlaas-io/rlaas
